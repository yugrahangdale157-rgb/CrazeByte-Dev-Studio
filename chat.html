<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — CrazeByte Dev Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="chat">

  <div class="app-shell">
    <aside class="sidebar" id="appSidebar"></aside>

    <div>
      <header class="topbar" id="appTopbar"></header>

      <main class="main-content">
        <div class="page-head">
          <div>
            <h1>Messages</h1>
            <p>Conversations are grouped by ticket. Replies update instantly.</p>
          </div>
        </div>

        <div class="chat-layout">
          <div class="chat-sidebar glass" id="chatTicketList"></div>

          <div class="chat-main glass">
            <div class="chat-header" id="chatHeader"></div>

            <div class="chat-bubbles" id="chatBubbles"></div>

            <div class="chat-empty-state" id="chatEmptyState">
              <div class="empty-state">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z" stroke="currentColor" stroke-width="1.7"/></svg></span>
                <h4>Select a conversation</h4>
                <p>Choose a ticket from the list to view and send messages.</p>
              </div>
            </div>

            <form class="chat-form" id="chatForm" hidden>
              <input type="text" id="chatInput" placeholder="Type a message…" autocomplete="off" />
              <button type="submit" aria-label="Send message">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M22 2 11 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2 15 22l-4-9-9-4 20-7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>
              </button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
